services:
  - type: web
    name: fx-bot-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ENABLE_AUTO_EXECUTION
        value: "true"
      - key: BROKER
        value: "mt5"
      - key: MT5_SHARED_SECRET
        sync: false
      - key: MT5_SYMBOL_PREFIX
        value: ""
      - key: MT5_SYMBOL_SUFFIX
        value: ""
      - key: MT5_SYMBOL_MAP_JSON
        value: "{}"
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
  - type: web
    name: fx-bot-web
    runtime: static
    buildCommand: npm ci --prefix client && npm run build --prefix client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://fx-bot-4q8t.onrender.com
